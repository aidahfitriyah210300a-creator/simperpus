<!DOCTYPE html>

<html class="light" lang="id">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SIPUS - Pembayaran Denda</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#262b2e",
                        "on-primary-fixed": "#00164e",
                        "on-error-container": "#93000a",
                        "surface": "#f8f9ff",
                        "secondary-fixed": "#6ffbbe",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-bright": "#f8f9ff",
                        "background": "#f8f9ff",
                        "surface-container-high": "#dce9ff",
                        "on-secondary-container": "#00714d",
                        "surface-dim": "#cbdbf5",
                        "on-primary-fixed-variant": "#264191",
                        "on-secondary-fixed": "#002113",
                        "error": "#ba1a1a",
                        "surface-tint": "#4059aa",
                        "inverse-primary": "#b6c4ff",
                        "on-tertiary-fixed": "#171c1f",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "outline": "#757682",
                        "on-primary-container": "#90a8ff",
                        "tertiary-container": "#3c4144",
                        "primary-container": "#1e3a8a",
                        "inverse-surface": "#213145",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#43474b",
                        "tertiary-fixed-dim": "#c3c7cb",
                        "secondary-fixed-dim": "#4edea3",
                        "on-background": "#0b1c30",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c5c5d3",
                        "on-tertiary-container": "#a8adb1",
                        "on-surface": "#0b1c30",
                        "secondary-container": "#6cf8bb",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#00236f",
                        "surface-variant": "#d3e4fe",
                        "inverse-on-surface": "#eaf1ff",
                        "on-surface-variant": "#444651",
                        "tertiary-fixed": "#dfe3e7",
                        "surface-container-highest": "#d3e4fe",
                        "secondary": "#006c49",
                        "primary-fixed": "#dce1ff",
                        "primary-fixed-dim": "#b6c4ff",
                        "surface-container": "#e5eeff",
                        "surface-container-low": "#eff4ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "xs": "4px",
                        "md": "16px",
                        "xl": "48px",
                        "lg": "24px",
                        "container-max": "1440px",
                        "sm": "8px",
                        "base": "4px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "h1": ["Manrope"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-sm": ["Inter"],
                        "button": ["Inter"],
                        "label-caps": ["Inter"],
                        "h2": ["Manrope"],
                        "h3": ["Manrope"]
                    },
                    "fontSize": {
                        "h1": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "letterSpacing": "0", "fontWeight": "400" }],
                        "button": ["15px", { "lineHeight": "1", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "h2": ["32px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "h3": ["24px", { "lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
   <link rel="stylesheet" href="style.css">
</head>

<body class="bg-surface font-body-md text-on-surface min-h-screen pb-24">
    <!-- TopAppBar -->
    <header
        class="sticky top-0 w-full z-50 flex items-center px-4 h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
        <button
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
            <span class="material-symbols-outlined text-blue-900 dark:text-blue-400"
                data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="font-manrope font-bold text-lg ml-2 text-blue-900 dark:text-blue-400">Payment Details</h1>
    </header>
    <main class="max-w-xl mx-auto p-lg space-y-lg">
        <!-- Fine Summary Card -->
        <section
            class="bg-surface-container-lowest p-lg rounded-xl border border-outline-variant shadow-sm flex gap-md">
            <div class="w-24 h-32 flex-shrink-0 bg-slate-200 rounded-lg overflow-hidden border border-outline-variant">
                <img alt="The Architect of Tomorrow" class="w-full h-full object-cover"
                    data-alt="professional book cover featuring minimalist modern architecture blueprint design in deep navy and gold accents"
                    src="hujan.bmp" />
            </div>
            <div class="flex flex-col justify-between py-xs">
                <div>
                    <span
                        class="font-label-caps text-error bg-error-container px-2 py-1 rounded-full mb-2 inline-block uppercase">5
                        Days Late</span>
                    <h3 class="font-h3 text-primary text-lg">Hujan</h3>
                    <p class="font-body-sm text-on-surface-variant">ISBN: 978-0123456789</p>
                </div>
                <div class="mt-2">
                    <p class="font-label-caps text-on-surface-variant">TOTAL FINE</p>
                    <p class="font-h2 text-primary-container text-2xl">Rp 15.000</p>
                </div>
            </div>
        </section>
        <!-- Payment Method Selection -->
        <section class="space-y-md">
            <h2 class="font-h3 text-on-surface text-xl">Pilih Metode Pembayaran</h2>
            <div class="space-y-sm">
                <!-- OVO/GoPay -->
                <label
                    class="flex items-center p-md bg-white border-2 border-primary-container rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors group">
                    <div
                        class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container text-primary-container mr-md">
                        <span class="material-symbols-outlined"
                            data-icon="account_balance_wallet">account_balance_wallet</span>
                    </div>
                    <div class="flex-grow">
                        <p class="font-button text-on-surface">E-Wallet (OVO/GoPay)</p>
                        <p class="font-body-sm text-on-surface-variant">Instant confirmation</p>
                    </div>
                    <div
                        class="w-6 h-6 rounded-full border-2 border-primary-container flex items-center justify-center">
                        <div class="w-3 h-3 bg-primary-container rounded-full"></div>
                    </div>
                </label>
                <!-- Virtual Account -->
                <label
                    class="flex items-center p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors group">
                    <div
                        class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container text-on-surface-variant mr-md">
                        <span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
                    </div>
                    <div class="flex-grow">
                        <p class="font-button text-on-surface">Virtual Account (BCA/Mandiri)</p>
                        <p class="font-body-sm text-on-surface-variant">Verify in 5-10 minutes</p>
                    </div>
                    <div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
                </label>
                <!-- Cash at Counter -->
                <label
                    class="flex items-center p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors group">
                    <div
                        class="w-10 h-10 flex items-center justify-center rounded-lg bg-surface-container text-on-surface-variant mr-md">
                        <span class="material-symbols-outlined" data-icon="payments">payments</span>
                    </div>
                    <div class="flex-grow">
                        <p class="font-button text-on-surface">Tunai di Loket</p>
                        <p class="font-body-sm text-on-surface-variant">Manual validation by Librarian</p>
                    </div>
                    <div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
                </label>
            </div>
        </section>
        <!-- Summary Section -->
        <section class="bg-surface-container p-lg rounded-xl space-y-md">
            <div class="flex justify-between items-center text-on-surface-variant">
                <span class="font-body-md">Subtotal Denda</span>
                <span class="font-body-md font-semibold">Rp 15.000</span>
            </div>
            <div class="flex justify-between items-center text-on-surface-variant">
                <span class="font-body-md">Biaya Layanan</span>
                <span class="font-body-md font-semibold">Rp 1.000</span>
            </div>
            <div class="pt-md border-t border-outline-variant flex justify-between items-center">
                <span class="font-h3 text-on-surface text-lg">Total Pembayaran</span>
                <span class="font-h3 text-primary-container text-lg">Rp 16.000</span>
            </div>
        </section>
    </main>
    <!-- Bottom Action Bar -->
    <div class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 p-md z-40">
        <div class="max-w-xl mx-auto flex items-center gap-md">
            <div class="hidden md:block flex-grow">
                <p class="font-label-caps text-on-surface-variant">TOTAL PAYMENT</p>
                <p class="font-h3 text-primary-container">Rp 16.000</p>
            </div>
            <button
                class="w-full bg-primary-container text-on-primary font-button py-4 rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center gap-sm">
                <span class="material-symbols-outlined" data-icon="verified">verified</span>
                <span>Bayar Sekarang</span>
            </button>
        </div>
    </div>
    <!-- BottomNavBar (Hidden for transactional screen as per rule) -->
    <!-- Navigation shell suppressed for transactional journey -->
</body>

</html>
